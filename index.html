<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Course Management Dashboard</title>

<style>
/* ===============================
   PROFESSIONAL COLOR PALETTE
=================================*/
:root{
  --bg:#0f172a;
  --card:#111827;
  --card2:#1e293b;
  --primary:#3b82f6;
  --primary-hover:#2563eb;
  --success:#10b981;
  --danger:#ef4444;
  --warning:#f59e0b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:#334155;
}

/* ===============================
   GLOBAL
=================================*/
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Tahoma, sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
  min-height:100vh;
  color:var(--text);
  padding:30px;
}

.container{
  max-width:1400px;
  margin:auto;
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:30px;
}

/* ===============================
   TOP GRID
=================================*/
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.card{
  background:rgba(17,24,39,0.95);
  border:1px solid var(--border);
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

/* ===============================
   FORM
=================================*/
.form-group{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:6px;
  color:#cbd5e1;
  font-size:14px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  border:1px solid #334155;
}

input:focus{
  border:1px solid var(--primary);
}

button{
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-primary:hover{
  background:var(--primary-hover);
}

.btn-danger{
  background:var(--danger);
  color:white;
}

.btn-edit{
  background:var(--warning);
  color:white;
}

.btn-success{
  background:var(--success);
  color:white;
}

.actions{
  display:flex;
  gap:10px;
}

/* ===============================
   TABLE
=================================*/
.table-container{
  margin-top:30px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid #334155;
}

th{
  color:#cbd5e1;
  font-size:14px;
}

tr:hover{
  background:#1e293b;
}

.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.published{
  background:rgba(16,185,129,.15);
  color:#10b981;
}

.unpublished{
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

/* ===============================
   SEARCH
=================================*/
.search-box{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.search-box input{
  flex:1;
}

/* ===============================
   RESPONSIVE
=================================*/
@media(max-width:950px){
  .grid{
    grid-template-columns:1fr;
  }

  table{
    font-size:14px;
  }

  h1{
    font-size:28px;
  }
}
</style>
</head>
<body>

<div class="container">

<h1>🎓 Course Management Dashboard</h1>
<p class="subtitle">Professional FastAPI Frontend UI</p>

<div class="grid">

<!-- FORM -->
<div class="card">
<h2 style="margin-bottom:20px;">Add / Update Course</h2>

<form id="courseForm">

<input type="hidden" id="courseId">

<div class="form-group">
<label>Title</label>
<input type="text" id="title" required>
</div>

<div class="form-group">
<label>Instructor</label>
<input type="text" id="instructor" required>
</div>

<div class="form-group">
<label>Category</label>
<input type="text" id="category" required>
</div>

<div class="form-group">
<label>Price</label>
<input type="number" id="price" required>
</div>

<div class="form-group">
<label>Duration Hours</label>
<input type="number" id="duration_hours" required>
</div>

<div class="form-group">
<label>Discount %</label>
<input type="number" id="discount_percent" value="0">
</div>

<div class="form-group">
<label>Published</label>
<select id="is_published">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
</div>

<div class="actions">
<button type="submit" class="btn-primary">Save Course</button>
<button type="button" onclick="resetForm()" class="btn-success">Clear</button>
</div>

</form>
</div>

<!-- SEARCH -->
<div class="card">
<h2 style="margin-bottom:20px;">Search / Filter</h2>

<div class="search-box">
<input type="number" id="maxPrice" placeholder="Enter Max Price">
<button class="btn-primary" onclick="filterCourses()">Filter</button>
<button class="btn-success" onclick="loadCourses()">All</button>
</div>

<p style="margin-top:20px;color:var(--muted)">
Manage your FastAPI backend courses with modern UI.
</p>

</div>

</div>

<!-- TABLE -->
<div class="card table-container">
<h2>All Courses</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Instructor</th>
<th>Price</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="courseTable"></tbody>

</table>
</div>

</div>

<script>
const BASE_URL = "http://127.0.0.1:8000";

// Load all data
async function loadCourses(){
  const res = await fetch(`${BASE_URL}/courses`);
  const data = await res.json();

  const table = document.getElementById("courseTable");
  table.innerHTML = "";

  data.forEach(course=>{
    table.innerHTML += `
      <tr>
        <td>${course.id}</td>
        <td>${course.title}</td>
        <td>${course.instructor}</td>
        <td>₹${course.price}</td>
        <td>
          <span class="badge ${course.is_published ? 'published':'unpublished'}">
            ${course.is_published ? 'Published':'Draft'}
          </span>
        </td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick='editCourse(${JSON.stringify(course)})'>Edit</button>
            <button class="btn-danger" onclick="deleteCourse(${course.id})">Delete</button>
          </div>
        </td>
      </tr>
    `;
  });
}

// Submit form
document.getElementById("courseForm").addEventListener("submit", async(e)=>{
  e.preventDefault();

  const id = document.getElementById("courseId").value;

  const course = {
    title:title.value,
    instructor:instructor.value,
    category:category.value,
    price:Number(price.value),
    duration_hours:Number(duration_hours.value),
    discount_percent:Number(discount_percent.value),
    is_published:is_published.value==="true"
  };

  if(id){
    await fetch(`${BASE_URL}/courses/${id}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({...course,id:Number(id)})
    });
  }else{
    await fetch(`${BASE_URL}/courses`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(course)
    });
  }

  resetForm();
  loadCourses();
});

// Delete
async function deleteCourse(id){
  if(confirm("Delete this course?")){
    await fetch(`${BASE_URL}/courses/${id}`,{
      method:"DELETE"
    });
    loadCourses();
  }
}

// Edit
function editCourse(course){
  courseId.value = course.id;
  title.value = course.title;
  instructor.value = course.instructor;
  category.value = course.category;
  price.value = course.price;
  duration_hours.value = course.duration_hours;
  discount_percent.value = course.discount_percent;
  is_published.value = course.is_published;
}

// Reset
function resetForm(){
  document.getElementById("courseForm").reset();
  courseId.value="";
}

// Filter
async function filterCourses(){
  const maxPrice = document.getElementById("maxPrice").value;

  const res = await fetch(`${BASE_URL}/courses/filter/search?max_price=${maxPrice}`);
  const data = await res.json();

  const table = document.getElementById("courseTable");
  table.innerHTML="";

  data.courses.forEach(course=>{
    table.innerHTML += `
      <tr>
        <td>${course.id}</td>
        <td>${course.title}</td>
        <td>${course.instructor}</td>
        <td>₹${course.price}</td>
        <td>
          <span class="badge ${course.is_published ? 'published':'unpublished'}">
            ${course.is_published ? 'Published':'Draft'}
          </span>
        </td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick='editCourse(${JSON.stringify(course)})'>Edit</button>
            <button class="btn-danger" onclick="deleteCourse(${course.id})">Delete</button>
          </div>
        </td>
      </tr>
    `;
  });
}

loadCourses();
</script>

</body>
</html>
